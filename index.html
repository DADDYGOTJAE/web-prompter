<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>나만의 프롬프터</title>
<style>
  :root {
    --accent: #ffd400;
    --bg: #0d0d0f;
    --panel: #18181b;
    --panel-2: #232327;
    --text: #f4f4f5;
    --muted: #9a9aa2;
    --border: #2c2c31;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard",
                 "Malgun Gothic", "맑은 고딕", sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ============ 설정 화면 ============ */
  #setup {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 64px;
    height: 100%;
    overflow-y: auto;
  }
  #setup h1 {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  #setup .sub {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  textarea {
    width: 100%;
    height: 320px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 15px;
    line-height: 1.75;
    padding: 18px;
    resize: vertical;
    outline: none;
    font-family: inherit;
  }
  textarea:focus { border-color: #3a3a40; }
  textarea::placeholder { color: #5c5c64; }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 18px;
    margin-top: 22px;
    align-items: end;
  }
  @media (max-width: 640px) {
    .controls { grid-template-columns: 1fr 1fr; }
    .theme-block { grid-column: 1 / -1; }
  }
  .field label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .field label b { color: var(--text); font-weight: 700; }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 6px;
    background: var(--panel-2);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid #1a1a1d;
  }
  input[type=range]::-moz-range-thumb {
    width: 20px; height: 20px;
    border: 3px solid #1a1a1d;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .theme-block label { font-size: 13px; color: var(--muted); margin-bottom: 10px; display: block; }
  .seg {
    display: inline-flex;
    background: var(--panel-2);
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
  }
  .seg button {
    border: 0;
    background: transparent;
    color: var(--muted);
    padding: 8px 18px;
    border-radius: 7px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
  }
  .seg button.active { background: var(--text); color: #111; }

  #startBtn {
    margin-top: 30px;
    width: 100%;
    background: var(--accent);
    color: #111;
    border: 0;
    border-radius: 14px;
    padding: 18px;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    transition: filter .15s;
  }
  #startBtn:hover { filter: brightness(1.05); }
  #startBtn:active { transform: translateY(1px); }

  .hint {
    text-align: center;
    color: var(--muted);
    font-size: 12.5px;
    margin-top: 16px;
    line-height: 1.7;
  }
  .hint kbd {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 1px 7px;
    font-size: 11.5px;
    font-family: inherit;
  }

  /* ============ 프롬프터 화면 ============ */
  #stage {
    display: none;
    position: fixed;
    inset: 0;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;   /* 카메라(모니터 상단)와 시선 맞추기 위해 상단 정렬 */
    padding-top: 4vh;
    overflow: hidden;
  }
  #stage.dark  { background: #000; color: #fff; }
  #stage.light { background: #fff; color: #111; }

  #track {
    width: 100%;
    max-width: 1100px;
    padding: 0 6vw;
    text-align: center;
  }
  .line {
    line-height: 1.4;
    margin: 0.55em 0;
    transition: transform .23s cubic-bezier(.22,.61,.36,1),
                opacity .23s cubic-bezier(.22,.61,.36,1),
                font-size .15s ease;
    word-break: keep-all;
  }
  .line.current { font-weight: 800; opacity: 1; }
  .line.near    { opacity: 0.34; font-weight: 500; }
  .line.far     { opacity: 0.12; font-weight: 500; }
  #stage.light .line.near { opacity: 0.40; }
  #stage.light .line.far  { opacity: 0.16; }

  /* 상단 컨트롤 */
  #topbar {
    position: fixed;
    top: 18px; right: 20px;
    display: flex;
    gap: 8px;
    align-items: center;
    z-index: 10;
  }
  #topbar button {
    width: 44px; height: 44px;
    border-radius: 11px;
    border: 1px solid rgba(128,128,128,.35);
    background: rgba(128,128,128,.16);
    color: inherit;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    backdrop-filter: blur(6px);
    font-family: inherit;
  }
  #topbar button:hover { background: rgba(128,128,128,.3); }
  #topbar .exit { width: auto; padding: 0 16px; font-size: 14px; }

  /* 진행 표시 + 안내 */
  #progress {
    position: fixed;
    bottom: 20px; left: 0; right: 0;
    text-align: center;
    font-size: 13px;
    opacity: 0.5;
    z-index: 10;
  }
  #footHint {
    position: fixed;
    bottom: 20px; right: 20px;
    font-size: 12px;
    opacity: 0.4;
    z-index: 10;
  }
  /* 중앙 가이드 라인(현재 문장 위치 표시) */
  #guide {
    position: fixed;
    left: 0; right: 0; top: 50%;
    height: 0;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>

<!-- ========== 설정 화면 ========== -->
<section id="setup">
  <h1>나만의 프롬프터</h1>
  <p class="sub">대본을 붙여넣고 시작하세요.<br>한 문장씩 또렷하게 보여주고, 방향키로 넘기면 됩니다.</p>

  <textarea id="script" placeholder="여기에 대본을 붙여넣으세요.

마침표(.) 물음표(?) 느낌표(!) 또는 줄바꿈을 기준으로 한 문장씩 나뉘어 보여집니다.

촬영 중에는:
· 방향키 ↓ → (또는 스페이스바)로 다음 문장
· 방향키 ↑ ← 로 이전 문장
· 우측 상단 A− / A+ 로 글씨 크기 조절
· ESC 로 종료"></textarea>

  <div class="controls">
    <div class="field">
      <label>현재 문장 크기 <b id="curVal">44px</b></label>
      <input type="range" id="curSize" min="24" max="96" step="2" value="44">
    </div>
    <div class="field">
      <label>주변 문장 크기 <b id="nearVal">30px</b></label>
      <input type="range" id="nearSize" min="14" max="64" step="2" value="30">
    </div>
    <div class="theme-block field">
      <label>테마</label>
      <div class="seg" id="themeSeg">
        <button data-theme="dark" class="active">다크</button>
        <button data-theme="light">화이트</button>
      </div>
    </div>
  </div>

  <button id="startBtn">시작하기 →</button>
  <p class="hint">
    <kbd>↓</kbd> <kbd>→</kbd> <kbd>Space</kbd> 다음 &nbsp;·&nbsp;
    <kbd>↑</kbd> <kbd>←</kbd> 이전 &nbsp;·&nbsp;
    <kbd>A</kbd> 크게 / <kbd>Z</kbd> 작게 &nbsp;·&nbsp;
    <kbd>ESC</kbd> 종료
  </p>
</section>

<!-- ========== 프롬프터 화면 ========== -->
<section id="stage" class="dark">
  <div id="guide"></div>
  <div id="track"></div>

  <div id="topbar">
    <button id="minus" title="작게 (Z)">A−</button>
    <button id="plus" title="크게 (A)">A+</button>
    <button class="exit" id="exit" title="종료 (ESC)">종료</button>
  </div>
  <div id="progress"></div>
  <div id="footHint">↓ → Space 다음 · ↑ ← 이전</div>
</section>

<script>
(function () {
  "use strict";

  // ---------- 요소 ----------
  var setup   = document.getElementById("setup");
  var stage   = document.getElementById("stage");
  var track   = document.getElementById("track");
  var scriptEl= document.getElementById("script");
  var curSize = document.getElementById("curSize");
  var nearSize= document.getElementById("nearSize");
  var curVal  = document.getElementById("curVal");
  var nearVal = document.getElementById("nearVal");
  var progress= document.getElementById("progress");

  var STORE = "prompter_settings_v1";
  var lines = [];
  var index = 0;

  // ---------- 설정 저장/복원 ----------
  function loadSettings() {
    try {
      var s = JSON.parse(localStorage.getItem(STORE) || "{}");
      if (s.cur)   curSize.value  = s.cur;
      if (s.near)  nearSize.value = s.near;
      if (s.theme) setTheme(s.theme);
      if (s.script)scriptEl.value = s.script;
    } catch (e) {}
    syncLabels();
  }
  function saveSettings() {
    var s = {
      cur:   curSize.value,
      near:  nearSize.value,
      theme: stage.classList.contains("light") ? "light" : "dark",
      script: scriptEl.value
    };
    try { localStorage.setItem(STORE, JSON.stringify(s)); } catch (e) {}
  }
  function syncLabels() {
    curVal.textContent  = curSize.value + "px";
    nearVal.textContent = nearSize.value + "px";
  }

  // ---------- 테마 ----------
  function setTheme(t) {
    stage.classList.toggle("light", t === "light");
    stage.classList.toggle("dark",  t !== "light");
    var btns = document.querySelectorAll("#themeSeg button");
    btns.forEach(function (b) { b.classList.toggle("active", b.dataset.theme === t); });
  }
  document.getElementById("themeSeg").addEventListener("click", function (e) {
    var b = e.target.closest("button");
    if (!b) return;
    setTheme(b.dataset.theme);
    saveSettings();
  });

  // ---------- 슬라이더 ----------
  curSize.addEventListener("input",  function () { syncLabels(); saveSettings(); if (stage.style.display!=="flex") {} render(); });
  nearSize.addEventListener("input", function () { syncLabels(); saveSettings(); render(); });

  // ---------- 문장 분리 ----------
  function splitSentences(text) {
    var out = [];
    // 줄 단위로 먼저 나누고, 각 줄을 문장부호 기준으로 다시 분리
    text.split(/\n+/).forEach(function (para) {
      para = para.trim();
      if (!para) return;
      // 마침표/물음표/느낌표(+따옴표) 뒤에서 끊기. 부호는 문장에 포함.
      var parts = para.match(/[^.!?。！？]+[.!?。！？]*[")'”’\]]*\s*/g);
      if (!parts) { out.push(para); return; }
      parts.forEach(function (p) {
        p = p.trim();
        if (p) out.push(p);
      });
    });
    return out;
  }

  // ---------- 렌더링 ----------
  function render() {
    if (!lines.length) return;
    var cur  = parseInt(curSize.value, 10);
    var near = parseInt(nearSize.value, 10);
    track.innerHTML = "";

    // 현재 문장을 맨 위에 두고, 다음 문장들을 아래로 흐르게 그린다(카메라 상단 정렬)
    for (var i = index; i <= index + 4; i++) {
      if (i < 0 || i >= lines.length) continue;
      var div = document.createElement("div");
      div.className = "line";
      div.textContent = lines[i];
      var dist = Math.abs(i - index);
      if (dist === 0) {
        div.classList.add("current");
        div.style.fontSize = cur + "px";
      } else if (dist === 1) {
        div.classList.add("near");
        div.style.fontSize = near + "px";
      } else {
        div.classList.add("far");
        div.style.fontSize = Math.max(12, near - 6) + "px";
      }
      track.appendChild(div);
    }
    progress.textContent = (index + 1) + " / " + lines.length;
  }

  function go(delta) {
    var n = index + delta;
    if (n < 0) n = 0;
    if (n > lines.length - 1) n = lines.length - 1;
    if (n === index) return;
    index = n;
    render();
  }

  // 촬영 중 글씨 크기 조절 (자동 저장)
  function bumpSize(d) {
    var v = Math.min(96, Math.max(24, parseInt(curSize.value, 10) + d));
    curSize.value = v;
    // 주변 문장도 비율 맞춰 살짝 따라오게
    var nv = Math.min(64, Math.max(14, parseInt(nearSize.value, 10) + (d > 0 ? 1 : -1)));
    nearSize.value = nv;
    syncLabels();
    saveSettings();
    render();
  }
  document.getElementById("plus").addEventListener("click", function(){ bumpSize(4); });
  document.getElementById("minus").addEventListener("click", function(){ bumpSize(-4); });
  document.getElementById("exit").addEventListener("click", stop);

  // ---------- 시작 / 종료 ----------
  function start() {
    lines = splitSentences(scriptEl.value);
    if (!lines.length) {
      scriptEl.focus();
      scriptEl.style.borderColor = "#e0506a";
      setTimeout(function(){ scriptEl.style.borderColor = ""; }, 1200);
      return;
    }
    index = 0;
    saveSettings();
    setup.style.display = "none";
    stage.style.display = "flex";
    render();
    // 모바일/태블릿: 가로 권장 + 화면 꺼짐 방지 시도
    requestWakeLock();
  }
  function stop() {
    releaseWakeLock();
    stage.style.display = "none";
    setup.style.display = "block";
  }
  document.getElementById("startBtn").addEventListener("click", start);

  // ---------- 키보드 ----------
  document.addEventListener("keydown", function (e) {
    if (stage.style.display !== "flex") return;
    switch (e.key) {
      case "ArrowDown": case "ArrowRight": case " ": case "PageDown":
        e.preventDefault(); go(1); break;
      case "ArrowUp": case "ArrowLeft": case "PageUp":
        e.preventDefault(); go(-1); break;
      case "Home": e.preventDefault(); index = 0; render(); break;
      case "End":  e.preventDefault(); index = lines.length - 1; render(); break;
      case "a": case "A": e.preventDefault(); bumpSize(4); break;
      case "z": case "Z": e.preventDefault(); bumpSize(-4); break;
      case "Escape": e.preventDefault(); stop(); break;
    }
  });

  // ---------- 터치/클릭으로 넘기기 ----------
  // 화면 아래쪽 절반 탭 = 다음, 위쪽 절반 탭 = 이전
  stage.addEventListener("click", function (e) {
    if (e.target.closest("#topbar")) return;
    var half = window.innerHeight / 2;
    go(e.clientY > half ? 1 : -1);
  });
  // 스와이프
  var touchY = null;
  stage.addEventListener("touchstart", function(e){ touchY = e.touches[0].clientY; }, {passive:true});
  stage.addEventListener("touchend", function(e){
    if (touchY === null) return;
    var dy = e.changedTouches[0].clientY - touchY;
    if (Math.abs(dy) > 40) { go(dy < 0 ? 1 : -1); }
    touchY = null;
  }, {passive:true});

  // 마우스 휠로도 넘기기
  var wheelLock = false;
  stage.addEventListener("wheel", function (e) {
    if (wheelLock) return;
    wheelLock = true;
    go(e.deltaY > 0 ? 1 : -1);
    setTimeout(function(){ wheelLock = false; }, 180);
  }, {passive:true});

  // ---------- 화면 꺼짐 방지 ----------
  var wakeLock = null;
  function requestWakeLock() {
    if ("wakeLock" in navigator) {
      navigator.wakeLock.request("screen").then(function(w){ wakeLock = w; }).catch(function(){});
    }
  }
  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release().catch(function(){}); wakeLock = null; }
  }
  document.addEventListener("visibilitychange", function(){
    if (document.visibilityState === "visible" && stage.style.display === "flex") requestWakeLock();
  });

  // ---------- 초기화 ----------
  loadSettings();
})();
</script>
</body>
</html>
